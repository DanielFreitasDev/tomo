<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tomo</title>
    <!-- Pre-paint background + OS dark preference so system-theme users (the
         default) don't flash light before settings load. The app reconciles
         the real theme on boot. -->
    <style>
      html { background: #f4f4f5; }
      html.dark { background: #101012; }
    </style>
    <script>
      try {
        if (matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark')
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
